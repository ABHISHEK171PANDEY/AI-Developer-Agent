name: AI Dev Agent - PR Check & Auto Fix

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    # Always run so the fix agent can trigger on failure
    continue-on-error: true

    outputs:
      pipeline_failed: ${{ steps.set-status.outputs.failed }}
      log_path: ${{ steps.set-status.outputs.log_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8 (lint)
        id: flake8
        run: |
          flake8 src/ --max-line-length=100 --format=default 2>&1 | tee /tmp/flake8.log || true

      - name: Run pytest
        id: pytest
        run: |
          pytest tests/ -v --tb=short 2>&1 | tee /tmp/pytest.log || true

      - name: Combine logs
        id: combine-logs
        run: |
          LOG_FILE=/tmp/ci_failure.log
          echo "=== FLAKE8 OUTPUT ===" > $LOG_FILE
          cat /tmp/flake8.log >> $LOG_FILE
          echo "" >> $LOG_FILE
          echo "=== PYTEST OUTPUT ===" >> $LOG_FILE
          cat /tmp/pytest.log >> $LOG_FILE
          echo "LOG_PATH=$LOG_FILE" >> $GITHUB_ENV

      - name: Check for failures
        id: set-status
        run: |
          FAILED=false
          if grep -q "FAILED\|ERROR\|error" /tmp/pytest.log 2>/dev/null; then
            FAILED=true
          fi
          if grep -q "E[0-9]\{3\}" /tmp/flake8.log 2>/dev/null; then
            FAILED=true
          fi
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "log_path=/tmp/ci_failure.log" >> $GITHUB_OUTPUT
          echo "Pipeline failed: $FAILED"

      - name: Upload failure logs
        if: steps.set-status.outputs.failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: /tmp/ci_failure.log
          retention-days: 1

  ai-fix-agent:
    name: AI Fix Agent
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: needs.lint-and-test.outputs.pipeline_failed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT so the agent can push branches and create PRs
          token: ${{ secrets.AGENT_PAT }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          pip install google-generativeai requests

      - name: Download failure logs
        uses: actions/download-artifact@v4
        with:
          name: ci-failure-logs
          path: /tmp/

      - name: Run Gemini failure analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/analyze_failure.py \
            --log /tmp/ci_failure.log \
            --source src/calculator.py \
            --output /tmp/gemini_fix.json

      - name: Apply Gemini fix
        run: |
          python scripts/apply_fix.py \
            --fix /tmp/gemini_fix.json \
            --source src/calculator.py

      - name: Create fix PR
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_PAT }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "AI Dev Agent"
          git config user.email "ai-agent@noreply.github.com"
          python scripts/create_pr.py \
            --fix /tmp/gemini_fix.json \
            --base "$BASE_BRANCH" \
            --repo "$REPO"
